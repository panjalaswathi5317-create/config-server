server:
  port: 8081

spring:
  datasource:
    url: jdbc:h2:mem:timesheetdb;DB_CLOSE_DELAY=-1
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

app:
  jwt:
    secret: "change-this-secret-to-a-long-random-string"
